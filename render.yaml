services:
  - type: web
    name: fc-support
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: NX_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "true"
    healthCheckPath: /healthz
    autoDeploy: true 