services:
  - type: web
    name: fc-support
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: NX_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true 