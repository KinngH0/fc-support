services:
  - type: web
    name: fc-support
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:10000 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: NX_API_KEY
        sync: false
      - key: PORT
        value: 10000 