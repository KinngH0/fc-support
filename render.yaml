services:
  - type: web
    name: fc-support
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -c gunicorn.conf.py app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: NX_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true 