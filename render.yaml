services:
  - type: web
    name: fc-support
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 4 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.0
      - key: NX_API_KEY
        sync: false
    healthCheckPath: /
    autoDeploy: true 