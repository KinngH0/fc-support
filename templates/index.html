{% extends "layout.html" %}

{% block content %}
<div class="container">
    <div class="text-center mb-16">
        <h1 class="text-4xl font-bold mb-4">FC Online 통계 분석 서비스</h1>
        <p class="text-xl text-gray-400">랭커들의 팀 컬러와 픽률을 분석하여 더 나은 게임 플레이를 도와드립니다.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
        <a href="{{ url_for('pick_rate_search') }}" class="block text-center hover:transform hover:scale-105 transition-all duration-300">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='images/stats-purple.svg') }}" alt="픽률 검색" class="w-48 h-48 mx-auto">
            </div>
            <h2 class="text-2xl font-bold text-purple-500 mb-2">픽률 검색</h2>
            <p class="text-gray-400">랭커들의 팀 컬러별 선수 픽률을 분석하여 제공합니다.</p>
        </a>

        <div class="text-center">
            <div class="mb-4">
                <img src="{{ url_for('static', filename='images/stats-white.svg') }}" alt="팀 컬러 분석" class="w-48 h-48 mx-auto">
            </div>
            <h2 class="text-2xl font-bold text-white mb-2">팀 컬러 분석</h2>
            <p class="text-gray-400">랭커들의 팀 컬러 선호도를 분석하여 제공합니다.</p>
        </div>
    </div>
</div>
{% endblock %}
