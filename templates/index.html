<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Support - 넥슨 FC Online API 지원</title>
    
    <!-- 파비콘 설정 -->
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/x-icon">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon.ico') }}">
    
    <!-- 스타일시트 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/heroicons@2.0.18/24/outline/index.min.js"></script>
</head>
<body class="bg-white dark:bg-[#0F172A] transition-colors duration-200">
    <div class="max-w-[1200px] mx-auto">
        <nav class="bg-white dark:bg-[#1E293B] shadow-lg relative w-full">
            <div class="px-6 py-2">
                <div class="flex items-center justify-center">
                    <div class="flex items-center">
                        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FC Support Logo" class="w-auto" style="height: 3rem;">
                        <div class="text-[3rem] font-bold ml-2 text-[rgb(78,182,85)] dark:text-[rgb(78,182,85)]">FC SUPPORT</div>
                    </div>
                </div>
            </div>
            <button id="theme-toggle" class="absolute right-0 top-1/2 -translate-y-1/2 p-2 rounded-lg bg-white hover:bg-gray-100 dark:bg-[#1E293B] dark:hover:bg-[#2D3B4F] flex items-center justify-center border border-gray-200 dark:border-gray-700 mr-6">
                <!-- 라이트 모드 아이콘 (달) -->
                <svg class="w-5 h-5 dark:hidden text-gray-800" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/>
                </svg>
                <!-- 다크 모드 아이콘 (해) -->
                <svg class="w-5 h-5 hidden dark:block text-gray-200" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
                </svg>
            </button>
        </nav>

        <main class="container mx-auto px-12 py-16">
            <div class="bg-white dark:bg-[#1E293B] rounded-lg shadow-lg p-6 mb-8">
                <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100 mb-4">FC ONLINE API 지원 서비스</h1>
                <p class="text-gray-600 dark:text-gray-300 mb-4">
                    FC Online API를 활용한 다양한 기능을 제공합니다. 선수 검색, 매치 기록 조회, 통계 분석 등을 쉽게 이용해보세요.
                </p>
                <div class="mt-6">
                    <form class="flex space-x-4">
                        <input type="text" 
                               placeholder="닉네임을 입력하세요" 
                               class="flex-1 px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[rgb(78,182,85)] dark:focus:border-[rgb(78,182,85)] dark:bg-[#2D3B4F] dark:text-white">
                        <button type="submit" 
                                class="px-6 py-2 bg-white hover:bg-gray-100 dark:bg-[#2D3B4F] dark:hover:bg-[#374357] text-[rgb(78,182,85)] border border-[rgb(78,182,85)] rounded-lg transition-colors">
                            검색
                        </button>
                    </form>
                </div>
            </div>

            <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white dark:bg-[#1E293B] rounded-lg shadow-lg p-6 transition-transform hover:scale-105">
                    <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">선수 검색</h2>
                    <p class="text-gray-600 dark:text-gray-300">선수의 상세 정보와 시즌별 기록을 확인해보세요.</p>
                    <a href="#" class="mt-4 inline-block text-[rgb(78,182,85)] hover:text-[rgb(60,150,70)] dark:text-[rgb(78,182,85)] dark:hover:text-[rgb(60,150,70)]">자세히 보기 →</a>
                </div>
                <div class="bg-white dark:bg-[#1E293B] rounded-lg shadow-lg p-6 transition-transform hover:scale-105">
                    <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">매치 기록</h2>
                    <p class="text-gray-600 dark:text-gray-300">최근 매치 기록과 상세 전적을 분석해보세요.</p>
                    <a href="#" class="mt-4 inline-block text-[rgb(78,182,85)] hover:text-[rgb(60,150,70)] dark:text-[rgb(78,182,85)] dark:hover:text-[rgb(60,150,70)]">자세히 보기 →</a>
                </div>
                <div class="bg-white dark:bg-[#1E293B] rounded-lg shadow-lg p-6 transition-transform hover:scale-105">
                    <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">통계 분석</h2>
                    <p class="text-gray-600 dark:text-gray-300">다양한 통계 데이터를 시각화하여 제공합니다.</p>
                    <a href="#" class="mt-4 inline-block text-[rgb(78,182,85)] hover:text-[rgb(60,150,70)] dark:text-[rgb(78,182,85)] dark:hover:text-[rgb(60,150,70)]">자세히 보기 →</a>
                </div>
            </div>
        </main>

        <footer class="bg-white dark:bg-[#1E293B] text-gray-600 dark:text-gray-400 mt-12 shadow-lg">
            <div class="container mx-auto px-6 py-4">
                <p class="text-center">© 2024 FC Support. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
</body>
</html>
