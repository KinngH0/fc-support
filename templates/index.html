<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Support - 넥슨 FC Online API 지원</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
</head>
<body class="bg-gray-100">
    <nav class="bg-blue-600 text-white shadow-lg">
        <div class="container mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="FC Support Logo" class="h-8 w-auto mr-3">
                    <div class="text-xl font-bold">FC Support</div>
                </div>
                <div class="hidden md:flex space-x-4">
                    <a href="#" class="hover:text-blue-200">홈</a>
                    <a href="#" class="hover:text-blue-200">선수 검색</a>
                    <a href="#" class="hover:text-blue-200">매치 기록</a>
                    <a href="#" class="hover:text-blue-200">통계</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">FC Online API 지원 서비스</h1>
            <p class="text-gray-600 mb-4">
                FC Online API를 활용한 다양한 기능을 제공합니다. 선수 검색, 매치 기록 조회, 통계 분석 등을 쉽게 이용해보세요.
            </p>
            <div class="mt-6">
                <form class="flex space-x-4">
                    <input type="text" 
                           placeholder="닉네임을 입력하세요" 
                           class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    <button type="submit" 
                            class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                        검색
                    </button>
                </form>
            </div>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">선수 검색</h2>
                <p class="text-gray-600">선수의 상세 정보와 시즌별 기록을 확인해보세요.</p>
                <a href="#" class="mt-4 inline-block text-blue-600 hover:text-blue-800">자세히 보기 →</a>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">매치 기록</h2>
                <p class="text-gray-600">최근 매치 기록과 상세 전적을 분석해보세요.</p>
                <a href="#" class="mt-4 inline-block text-blue-600 hover:text-blue-800">자세히 보기 →</a>
            </div>
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">통계 분석</h2>
                <p class="text-gray-600">다양한 통계 데이터를 시각화하여 제공합니다.</p>
                <a href="#" class="mt-4 inline-block text-blue-600 hover:text-blue-800">자세히 보기 →</a>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white mt-12">
        <div class="container mx-auto px-6 py-4">
            <p class="text-center text-gray-400">© 2024 FC Support. All rights reserved.</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
