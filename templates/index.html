{% extends "layout.html" %}

{% block content %}
<main class="container mx-auto px-6 py-16">
    <div class="max-w-4xl mx-auto text-center mb-16">
        <h1 class="text-4xl font-bold text-white mb-4">FC Online 통계 분석 서비스</h1>
        <p class="text-xl text-gray-400">랭커들의 팀 컬러와 픽률을 분석하여 더 나은 게임 플레이를 도와드립니다.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <a href="{{ url_for('pick_rate_search') }}" 
           class="group bg-gray-800/50 backdrop-blur-lg border border-gray-700/50 rounded-xl p-6 hover:bg-gray-700/50 transition-all duration-300">
            <div class="h-12 w-12 bg-green-500/10 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-white mb-2 group-hover:text-green-400 transition-colors">픽률 검색</h2>
            <p class="text-gray-400">랭커들의 팀 컬러별 선수 픽률을 분석하여 제공합니다.</p>
        </a>

        <div class="bg-gray-800/50 backdrop-blur-lg border border-gray-700/50 rounded-xl p-6">
            <div class="h-12 w-12 bg-blue-500/10 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-white mb-2">팀 컬러 분석</h2>
            <p class="text-gray-400">랭커들의 팀 컬러 선호도를 분석하여 제공합니다.</p>
        </div>

        <div class="bg-gray-800/50 backdrop-blur-lg border border-gray-700/50 rounded-xl p-6">
            <div class="h-12 w-12 bg-purple-500/10 rounded-lg flex items-center justify-center mb-4">
                <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
            </div>
            <h2 class="text-xl font-semibold text-white mb-2">효율 조회</h2>
            <p class="text-gray-400">지정된 일자의 FC 획득 효율을 분석하여 제공합니다.</p>
        </div>
    </div>
</main>
{% endblock %}
