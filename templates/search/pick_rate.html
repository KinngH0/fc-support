{% extends "layout.html" %}

{% block content %}
<main class="container mx-auto px-12 py-16">
    <div class="bg-white dark:bg-[#1E293B] rounded-lg shadow-lg p-6">
        <form id="pickRateForm" class="space-y-6">
            <div class="space-y-2">
                <label for="rankRange" class="block text-sm font-medium text-gray-700 dark:text-gray-300">랭킹 범위</label>
                <input type="number" 
                       id="rankRange" 
                       name="rankRange" 
                       max="10000" 
                       min="1"
                       placeholder="조회할 랭킹 범위 지정"
                       class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[rgb(78,182,85)] dark:focus:border-[rgb(78,182,85)] dark:bg-[#2D3B4F] dark:text-white placeholder-gray-400 dark:placeholder-gray-500">
            </div>

            <div class="space-y-2">
                <label for="teamColor" class="block text-sm font-medium text-gray-700 dark:text-gray-300">팀 컬러</label>
                <div class="relative">
                    <input type="text" 
                           id="teamColorSearch" 
                           placeholder="팀 컬러 검색"
                           class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[rgb(78,182,85)] dark:focus:border-[rgb(78,182,85)] dark:bg-[#2D3B4F] dark:text-white placeholder-gray-400 dark:placeholder-gray-500">
                    <select id="teamColor" 
                            name="teamColor"
                            class="mt-2 w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[rgb(78,182,85)] dark:focus:border-[rgb(78,182,85)] dark:bg-[#2D3B4F] dark:text-white">
                        <option value="">전체</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label for="topN" class="block text-sm font-medium text-gray-700 dark:text-gray-300">TOP N</label>
                <input type="number" 
                       id="topN" 
                       name="topN" 
                       max="10" 
                       min="1"
                       placeholder="포지션별 몇 위까지 출력할지 지정"
                       class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg focus:outline-none focus:border-[rgb(78,182,85)] dark:focus:border-[rgb(78,182,85)] dark:bg-[#2D3B4F] dark:text-white placeholder-gray-400 dark:placeholder-gray-500">
            </div>

            <div class="flex justify-end">
                <button type="submit" 
                        class="px-6 py-2 bg-white hover:bg-gray-100 dark:bg-[#2D3B4F] dark:hover:bg-[#374357] text-[rgb(78,182,85)] border border-[rgb(78,182,85)] rounded-lg transition-colors">
                    검색
                </button>
            </div>
        </form>

        <div id="searchResults" class="mt-8">
            <!-- 검색 결과가 여기에 표시됩니다 -->
        </div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pick_rate.js') }}" defer></script>
{% endblock %}
