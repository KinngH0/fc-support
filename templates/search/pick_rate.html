{% extends "layout.html" %}

{% block content %}
<main class="container mx-auto px-12 py-16 text-lg">
    <div class="bg-white dark:bg-[#1E293B] rounded-lg shadow-lg p-6">
        <form id="pickRateForm" class="space-y-6">
            <div class="space-y-2">
                <label for="rankRange" class="block font-medium text-gray-700 dark:text-gray-300">랭킹 범위</label>
                <input type="number" 
                       id="rankRange" 
                       name="rankRange" 
                       max="10000" 
                       min="1"
                       placeholder="조회할 랭킹 범위 지정"
                       class="w-full px-4 py-2 bg-[#1E293B] text-white border-0 rounded-lg focus:outline-none focus:ring-2 focus:ring-[rgb(78,182,85)] placeholder-gray-500">
            </div>

            <div class="space-y-2">
                <label for="teamColor" class="block font-medium text-gray-700 dark:text-gray-300">팀 컬러 필터</label>
                <input type="text" 
                       id="teamColor" 
                       name="teamColor"
                       list="teamColorList"
                       placeholder="조회할 팀 컬러 지정"
                       class="w-full px-4 py-2 bg-[#1E293B] text-white border-0 rounded-lg focus:outline-none focus:ring-2 focus:ring-[rgb(78,182,85)] placeholder-gray-500">
                <datalist id="teamColorList">
                    <option value="">전체</option>
                </datalist>
            </div>

            <div class="space-y-2">
                <label for="topN" class="block font-medium text-gray-700 dark:text-gray-300">TOP N</label>
                <input type="number" 
                       id="topN" 
                       name="topN" 
                       max="10" 
                       min="1"
                       placeholder="포지션별 몇 위까지 출력할지 지정"
                       class="w-full px-4 py-2 bg-[#1E293B] text-white border-0 rounded-lg focus:outline-none focus:ring-2 focus:ring-[rgb(78,182,85)] placeholder-gray-500">
            </div>

            <div class="flex justify-end">
                <button type="submit" 
                        class="px-6 py-2 bg-[#2D3B4F] hover:bg-[#374357] text-white rounded-lg transition-colors">
                    조회하기
                </button>
            </div>
        </form>

        <div id="searchResults" class="mt-8">
            <!-- 검색 결과가 여기에 표시됩니다 -->
        </div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pick_rate.js') }}" defer></script>
{% endblock %}
