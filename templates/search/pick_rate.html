{% extends "layout.html" %}

{% block content %}
<main class="container mx-auto px-6 py-16">
    <div class="max-w-4xl mx-auto text-center mb-12">
        <h1 class="text-3xl font-bold text-white mb-4">픽률 검색</h1>
        <p class="text-xl text-gray-400">랭커들의 팀 컬러별 선수 픽률을 분석하여 제공합니다.</p>
    </div>

    <div class="max-w-3xl mx-auto bg-gray-800/50 backdrop-blur-lg border border-gray-700/50 rounded-xl p-8">
        <form id="pickRateForm" class="space-y-8">
            <div class="space-y-4">
                <label for="rankRange" class="block text-lg font-medium text-white">랭킹 범위</label>
                <input type="number" 
                       id="rankRange" 
                       name="rankRange" 
                       max="10000" 
                       min="1"
                       placeholder="조회할 랭킹 범위를 입력하세요"
                       class="w-full px-4 py-3 bg-gray-900/50 text-white placeholder-gray-400 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <div class="space-y-4">
                <label for="teamColor" class="block text-lg font-medium text-white">팀 컬러 필터</label>
                <input type="text" 
                       id="teamColor" 
                       name="teamColor"
                       list="teamColorList"
                       placeholder="조회할 팀 컬러를 입력하세요"
                       class="w-full px-4 py-3 bg-gray-900/50 text-white placeholder-gray-400 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
                <datalist id="teamColorList">
                    <option value="">전체</option>
                </datalist>
            </div>

            <div class="space-y-4">
                <label for="topN" class="block text-lg font-medium text-white">TOP N</label>
                <input type="number" 
                       id="topN" 
                       name="topN" 
                       max="10" 
                       min="1"
                       placeholder="포지션별 상위 몇 명까지 출력할지 입력하세요"
                       class="w-full px-4 py-3 bg-gray-900/50 text-white placeholder-gray-400 border border-gray-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent">
            </div>

            <div class="flex justify-end pt-4">
                <button type="submit" 
                        class="px-8 py-3 bg-green-500 hover:bg-green-600 text-white font-medium rounded-lg transition-colors duration-200">
                    조회하기
                </button>
            </div>
        </form>

        <div id="searchResults" class="mt-8">
            <!-- 검색 결과가 여기에 표시됩니다 -->
        </div>
    </div>
</main>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pick_rate.js') }}" defer></script>
{% endblock %}
